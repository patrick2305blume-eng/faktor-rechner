<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faktoren-Übersicht Profil 2021</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 15px; margin: 0; }
        .container { max-width: 900px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border-left: 5px solid #8e44ad; }
        
        h2 { color: #8e44ad; text-align: center; margin-bottom: 5px; }
        .sub { text-align: center; color: #777; font-size: 12px; margin-bottom: 25px; }

        .settings { background: #252525; padding: 20px; border-radius: 12px; display: flex; gap: 15px; align-items: flex-end; margin-bottom: 30px; border: 1px solid #333; }
        .input-group { flex: 1; }
        label { display: block; font-size: 11px; color: #aaa; margin-bottom: 8px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #121212; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: #8e44ad; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1a1a1a; border-radius: 12px; border: 1px solid #333; overflow: hidden; }
        .card-header { background: #8e44ad; color: white; padding: 12px; font-weight: bold; text-align: center; font-size: 14px; }
        
        .table-wrapper { max-height: 500px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { position: sticky; top: 0; background: #222; color: #666; font-size: 10px; padding: 12px 8px; text-align: left; border-bottom: 1px solid #444; }
        td { padding: 10px 8px; border-bottom: 1px solid #252525; }

        .t-time { color: #888; font-weight: bold; width: 60px; }
        .t-ic { color: #8e44ad; font-weight: bold; text-align: right; }
        .t-isf { color: #2ecc71; font-weight: bold; text-align: right; }
        .unit { font-size: 10px; opacity: 0.5; margin-left: 2px; font-weight: normal; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 Faktoren-Tabelle</h2>
    <div class="sub">Circadiane Verteilung nach Nauck/Scheiner (Profil 2021)</div>

    <div class="settings">
        <div class="input-group">
            <label>Tages-Gesamtdosis (TDD)</label>
            <input type="number" id="tdd" value="50" oninput="draw()">
        </div>
        <div class="input-group">
            <label>Referenz-Profil</label>
            <select id="mode" onchange="draw()">
                <option value="nauck">Verteilung nach Nauck</option>
                <option value="scheiner">Verteilung nach Scheiner</option>
            </select>
        </div>
    </div>

    <div class="grid" id="content"></div>
</div>

<script>
/**
 * Basalraten-Verteilung in % (Summe 100%). 
 * Diese Kurven steuern laut PDF die Faktoren (Hohe Rate = Hoher Faktor / Kleiner ISF).
 */
const profiles = {
    "Kind (0-6 J.)": [4.2, 4.2, 4.2, 4.2, 4.3, 4.5, 4.6, 4.5, 4.4, 4.3, 4.2, 4.1, 4.0, 3.9, 3.9, 4.0, 4.1, 4.2, 4.3, 4.3, 4.2, 4.1, 4.1, 4.2],
    "Schulkind (6-12 J.)": [3.8, 3.7, 3.7, 3.8, 4.5, 5.5, 5.8, 5.5, 5.0, 4.5, 4.2, 3.8, 3.7, 3.6, 3.6, 3.7, 3.8, 4.0, 4.2, 4.3, 4.2, 4.1, 4.0, 3.9],
    "Jugend/Erw. (12-18+)": [3.2, 3.0, 3.0, 3.5, 5.5, 7.2, 7.5, 6.8, 5.5, 4.5, 4.0, 3.5, 3.2, 3.0, 3.0, 3.2, 3.5, 4.0, 4.5, 4.8, 4.5, 4.0, 3.6, 3.3]
};

function draw() {
    const tdd = parseFloat(document.getElementById('tdd').value) || 0;
    const container = document.getElementById('content');
    container.innerHTML = "";
    if (tdd <= 0) return;

    // Durchschnittswerte (500er / 1800er Regel)
    const avgIC_g = 500 / tdd; 
    const avgISF = 1800 / tdd;

    for (const [name, curve] of Object.entries(profiles)) {
        // Durchschnitt der Kurve zur Gewichtung (meist 4.16% bei 24h)
        const avgRate = curve.reduce((a, b) => a + b, 0) / 24;

        let html = `
            <div class="card">
                <div class="card-header">${name}</div>
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Zeit</th>
                                <th style="text-align:right">IE / 10g KH</th>
                                <th style="text-align:right">ISF (Senkung)</th>
                            </tr>
                        </thead>
                        <tbody>`;

        curve.forEach((rate, hour) => {
            const weight = rate / avgRate;
            
            // Faktor (IC): Je höher die Basalrate, desto mehr Insulin pro 10g KH
            const ic = (10 / (avgIC_g / weight)).toFixed(2);
            // Korrektur (ISF): Je höher die Basalrate, desto schwächer die Senkung
            const isf = Math.round(avgISF / weight);

            html += `
                <tr>
                    <td class="t-time">${hour.toString().padStart(2, '0')}:00</td>
                    <td class="t-ic">${ic}<span class="unit">IE</span></td>
                    <td class="t-isf">↓ ${isf}<span class="unit">mg</span></td>
                </tr>`;
        });

        html += `</tbody></table></div></div>`;
        container.innerHTML += html;
    }
}

draw();
</script>
</body>
</html>
